# sops' own config — the recipient list every secret in `secrets/` is encrypted to.
# This is read by the `sops` CLI when you create or re-key a secret; it is NOT a NixOS
# option. The decryption half lives in hosts/framework/secrets.nix.
#
# TWO RECIPIENTS, so every secret decrypts on the laptop *and* from the password manager
# and the crown-jewel key never has to sit on the device. The full rationale — and why the
# two keys have deliberately different lifetimes — is CONTEXT.md, "Admin age key" /
# "Host age key"; it is not repeated here so the two cannot drift apart.
#
# Only PUBLIC halves ever appear here. Recipients are not secrets; this file is safe in a
# public repo, and nothing in it is sensitive to leak.
#
# NOTE ON SHAPE: the recipients are listed inline below rather than as YAML anchors
# defined in a separate `keys:` block. Anchors are the more common sops idiom, but they
# split each recipient across two places — and uncommenting the anchor while forgetting
# its reference silently encrypts to a SMALLER recipient set, which is the one failure
# here that produces no error at all. One list, one edit, no silent half-states.
creation_rules:
  # Every secret file in secrets/ gets every recipient. One rule covering the whole
  # directory means a new secret is encrypted correctly by default — the Secure Boot
  # signing key (#4, ADR-0002) will land as secrets/secureboot.yaml and needs no change
  # here. Non-recursive on purpose: a nested path would silently miss this rule, so it is
  # better that sops errors on one than encrypts it to nobody.
  - path_regex: secrets/[^/]+\.yaml$
    key_groups:
      - age:
          # Admin — Drew's personal identity. Private half lives ONLY in the password
          # manager, never on the laptop and never in this repo. Losing it is the
          # unrecoverable case: it is what re-encrypts every secret to a fresh host age
          # key after a reinstall, so without it a dead laptop makes all committed
          # ciphertext permanently unreadable.
          - age1kwp52cr05yvkd7l72x6wj9cnzd5vlghqvkalng3cpfzpe2adtefsmk5e7h

          # Host age key — the laptop's own identity: its SSH host key
          # (/etc/ssh/ssh_host_ed25519_key) converted to an age recipient. This is what
          # decrypts secrets at activation.
          #
          # COMMENTED OUT BECAUSE THE MACHINE DOES NOT EXIST YET. It is generated by hand
          # in the installer, before the first `nixos-install`
          # (docs/hardware-acceptance.md, Phase B). A placeholder is not an option: age
          # recipients are checksummed, so a fake value makes every `sops` invocation
          # error rather than merely be wrong. Uncommenting is a real step in the ritual,
          # not cleanup:
          #
          #   nix shell nixpkgs#ssh-to-age -c ssh-to-age -i /mnt/etc/ssh/ssh_host_ed25519_key.pub
          #
          # Paste the resulting age1… below, uncomment it, then re-key the already-
          # committed secrets with the admin age key:
          #
          #   sops updatekeys secrets/users.yaml
          #
          # Until that is done, secrets decrypt from the password manager only — which is
          # exactly the correct state before there is a laptop to decrypt on. The build
          # warns while this is outstanding (hosts/framework/secrets.nix).
          # - age1REPLACE_WITH_HOST_KEY_AT_INSTALL
